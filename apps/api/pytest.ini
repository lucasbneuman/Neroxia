[pytest]
# Pytest configuration for WhatsApp Sales Bot API tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Coverage options (uncomment if pytest-cov is installed)
    # --cov=src
    # --cov-report=html
    # --cov-report=term-missing
    # --cov-report=xml
    # Warnings
    -W ignore::DeprecationWarning
    # Parallel execution (requires pytest-xdist)
    # -n auto

# Test paths
testpaths = tests

# Markers for test categorization
markers =
    unit: Unit tests for individual functions
    integration: Integration tests for complete workflows
    slow: Tests that take longer to run
    auth: Tests requiring authentication
    rag: Tests for RAG endpoints
    config: Tests for configuration endpoints
    bot: Tests for bot processing
    conversations: Tests for conversation management
    smoke: Quick smoke tests for basic functionality

# Minimum version
minversion = 7.0

# Console output options
console_output_style = progress

# Log options
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
