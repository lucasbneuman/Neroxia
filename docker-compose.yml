version: '3.8'

services:
  # PostgreSQL Database for local development
  postgres:
    image: postgres:15-alpine
    container_name: whatsapp-sales-postgres
    environment:
      POSTGRES_USER: salesbot
      POSTGRES_PASSWORD: salesbot_dev_password
      POSTGRES_DB: sales_bot
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/supabase_schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - whatsapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salesbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Service
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: whatsapp-sales-api
    ports:
      - '8000:8000'
    environment:
      - DATABASE_URL=postgresql+asyncpg://salesbot:salesbot_dev_password@postgres:5432/sales_bot
      - SUPABASE_DATABASE_URL=postgresql+asyncpg://salesbot:salesbot_dev_password@postgres:5432/sales_bot
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HUBSPOT_ACCESS_TOKEN=${HUBSPOT_ACCESS_TOKEN}
      - HUBSPOT_CLIENT_SECRET=${HUBSPOT_CLIENT_SECRET}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER}
      - SUPABASE_URL=${SUPABASE_URL:-http://localhost:8000}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-dummy-key-for-local}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-dummy-key-for-local}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG=True
    volumes:
      - ./.env:/app/.env
      - ./packages:/app/packages
      - ./apps/api:/app/apps/api
      - ./apps/bot-engine:/app/apps/bot-engine
      - ./chroma_db:/app/chroma_db
    networks:
      - whatsapp-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Web Service
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: whatsapp-sales-web
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL:-http://localhost:8000}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-dummy-key-for-local}
      - NODE_ENV=development
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules
    depends_on:
      api:
        condition: service_healthy
    networks:
      - whatsapp-network
    restart: unless-stopped

  # pgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: whatsapp-sales-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@salesbot.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    networks:
      - whatsapp-network
    depends_on:
      - postgres
    restart: unless-stopped

networks:
  whatsapp-network:
    driver: bridge

volumes:
  postgres_data:

