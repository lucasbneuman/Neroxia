name: CI/CD Pipeline

on:
  push:
    branches: [saas-migration, main]
  pull_request:
    branches: [saas-migration, main]

jobs:
  # ========================================
  # Lint Python Code (API & Bot Engine)
  # ========================================
  lint-python:
    name: Lint Python Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint API code
        run: |
          flake8 apps/api/src --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 apps/api/src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Lint Bot Engine code
        run: |
          flake8 apps/bot-engine/src --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 apps/bot-engine/src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # ========================================
  # Type Check Python Code
  # ========================================
  typecheck-python:
    name: Type Check Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy
          pip install -e packages/shared
          pip install -e packages/database
          pip install -e apps/bot-engine
          pip install -r apps/api/requirements.txt

      - name: Run mypy on API
        run: |
          mypy apps/api/src --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # Don't fail build on type errors initially

  # ========================================
  # Lint TypeScript/JavaScript (Frontend)
  # ========================================
  lint-typescript:
    name: Lint TypeScript/JavaScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true  # Don't fail build on lint errors initially

  # ========================================
  # Type Check TypeScript
  # ========================================
  typecheck-typescript:
    name: Type Check TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler check
        run: npx tsc --noEmit

  # ========================================
  # Build Docker Images
  # ========================================
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, web]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: false
          tags: neroxia-${{ matrix.service }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================
  # Run Tests (if they exist)
  # ========================================
  test-python:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -e packages/shared
          pip install -e packages/database
          pip install -e apps/bot-engine
          pip install -r apps/api/requirements.txt

      - name: Run tests with pytest
        run: |
          if [ -d "apps/api/tests" ]; then
            pytest apps/api/tests --cov=apps/api/src --cov-report=term-missing
          else
            echo "No tests found, skipping..."
          fi
        continue-on-error: true

  # ========================================
  # All Checks Passed
  # ========================================
  ci-success:
    name: All CI Checks Passed
    runs-on: ubuntu-latest
    needs: [lint-python, typecheck-python, lint-typescript, typecheck-typescript, docker-build, test-python]
    steps:
      - name: Success
        run: echo "All CI checks passed successfully!"

